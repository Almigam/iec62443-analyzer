version: '3.8'

services:
  analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iec62443-analyzer
    ports:
      - "443:443"
    volumes:
      - ./certs:/app/certs:ro
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      ENV: production
      PORT: 443
      DB_PATH: /app/data/iec62443.db
      TLS_CERT: /app/certs/server.crt
      TLS_KEY: /app/certs/server.key
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      ALLOWED_ORIGINS: https://localhost
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - ot-network

networks:
  ot-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
