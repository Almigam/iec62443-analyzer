services:
  analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iec62443-analyzer
    ports:
      - "443:443"
    volumes:
      - ./certs:/app/certs
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      ENV: production
      PORT: 443
      DB_PATH: /app/data/iec62443.db
      TLS_CERT: /app/certs/server.crt
      TLS_KEY: /app/certs/server.key
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      # Si el backend espera múltiples origines, normalmente usa algo como "https://10.10.10.99,https://otro.dominio"
      ALLOWED_ORIGINS: https://10.10.10.99
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - ot-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    container_name: iec62443-frontend
    ports:
      - "5173:80"
    depends_on:
      - analyzer
    restart: unless-stopped
    networks:
      - ot-network

networks:
  ot-network:
    driver: bridge