services:
  analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iec62443-analyzer
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      ENV: production
      PORT: 8080
      DB_PATH: /app/data/iec62443.db
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      # Orígenes permitidos para desarrollo local y Docker Compose
      ALLOWED_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:5173
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - ot-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    container_name: iec62443-frontend
    ports:
      - "5173:80"
    depends_on:
      - analyzer
    restart: unless-stopped
    networks:
      - ot-network

networks:
  ot-network:
    driver: bridge